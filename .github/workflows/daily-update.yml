name: Update Deposit Dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 13:00 Vietnam time
  workflow_dispatch:        # Manual "Run workflow" button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit dashboard.html + manual-overrides.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.GOOGLE_OAUTH_CLIENT }}' > oauth-client.json
          echo '${{ secrets.GOOGLE_OAUTH_TOKEN }}'  > oauth-token.json
          echo '${{ secrets.ANTHROPIC_API_KEY }}'   > anthropic-api-key.txt

      - name: Run deposit overview
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python deposit-overview.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html manual-overrides.json
          git diff --staged --quiet || git commit -m "auto: update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
