name: Update Deposit Dashboard

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Every 6h: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:               # Manual trigger (bot button presses / GitHub UI)
    inputs:
      skip_telegram:
        description: 'Skip Telegram notifications (dashboard refresh only)'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit dashboard.html back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.GOOGLE_OAUTH_CLIENT }}' > oauth-client.json
          echo '${{ secrets.GOOGLE_OAUTH_TOKEN }}'  > oauth-token.json
          echo '${{ secrets.ANTHROPIC_API_KEY }}'   > anthropic-api-key.txt

      - name: Restore database from previous run
        uses: actions/cache@v4
        with:
          path: dashboard.db
          key: dashboard-db-${{ github.run_id }}
          restore-keys: |
            dashboard-db-

      - name: Migrate from JSON if no database
        run: |
          if [ ! -f dashboard.db ]; then
            echo "No cached database — migrating from manual-overrides.json"
            python db.py migrate || echo "No JSON to migrate from, starting fresh"
          else
            echo "Database restored from cache ($(stat -c%s dashboard.db 2>/dev/null || stat -f%z dashboard.db) bytes)"
          fi

      - name: Run deposit overview
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_TELEGRAM:      ${{ github.event.inputs.skip_telegram || 'false' }}
        run: python deposit-overview.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge -X ours origin/main --no-edit || true
          git add dashboard.html
          git diff --staged --quiet || git commit -m "auto: update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
